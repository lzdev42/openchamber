name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 1.0.0)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get_version.outputs.version }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Get version
        id: get_version
        run: |
          if [[ -n "${{ github.event.inputs.version }}" ]]; then
            echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          elif [[ "${{ github.ref }}" == refs/tags/* ]]; then
            echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
          else
            echo "version=0.0.0-dev" >> $GITHUB_OUTPUT
          fi

      - name: Extract changelog for release
        id: changelog
        env:
          VERSION: ${{ steps.get_version.outputs.version }}
        run: |
          HAS_CHANGELOG=$(node - <<'NODE'
          const fs = require('fs');
          const version = process.env.VERSION;
          const changelogPath = 'CHANGELOG.md';
          let body = '';

          if (fs.existsSync(changelogPath)) {
            const changelog = fs.readFileSync(changelogPath, 'utf8');
            const sections = changelog.split(/^## /m);
            const section = sections.find(s => s.startsWith('[' + version + ']'));
            if (section) {
              body = ('## ' + section).trim();
              console.error('Found changelog section for ' + version);
            } else {
              console.error('No changelog section for ' + version + ', will use auto-generated notes');
            }
          } else {
            console.error('CHANGELOG.md not found, will use auto-generated notes');
          }

          fs.mkdirSync('artifacts', { recursive: true });
          if (body) {
            fs.writeFileSync('artifacts/release-notes.md', body + '\n');
            process.stdout.write('true');
          } else {
            process.stdout.write('false');
          }
          NODE
          )
          echo "has_changelog=$HAS_CHANGELOG" >> $GITHUB_OUTPUT

      - name: Create GitHub Release (draft)
        id: create_release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2.6.2
        with:
          tag_name: v${{ steps.get_version.outputs.version }}
          draft: true
          generate_release_notes: ${{ steps.changelog.outputs.has_changelog != 'true' }}
          body_path: ${{ steps.changelog.outputs.has_changelog == 'true' && 'artifacts/release-notes.md' || '' }}
          name: Ocelot v${{ steps.get_version.outputs.version }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-desktop-electron-macos:
    needs: create-release
    runs-on: macos-26
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            arch: arm64
            platform: darwin-aarch64
          - target: x86_64-apple-darwin
            arch: x64
            platform: darwin-x86_64
    steps:
      - name: Checkout selected ref
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ github.ref }}

      - name: Setup bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'

      - name: Bump version in package.json files
        run: node scripts/bump-version.mjs ${{ needs.create-release.outputs.version }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Get bundled OpenCode CLI version
        id: opencode_cli_version
        shell: bash
        run: |
          VERSION=$(node -p "require('./package.json').dependencies['@opencode-ai/sdk']")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Cache bundled OpenCode CLI artifact
        uses: actions/cache@0400d5f644dc74513175e3cd8d07132dd4860809 # v4.2.4
        with:
          path: packages/electron/.cache/opencode-cli
          key: opencode-cli-${{ runner.os }}-${{ matrix.arch }}-${{ steps.opencode_cli_version.outputs.version }}
          restore-keys: |
            opencode-cli-${{ runner.os }}-${{ matrix.arch }}-

      - name: Build Electron app
        working-directory: packages/electron
        env:
          ELECTRON_BUILDER_ARCH: ${{ matrix.arch }}
        run: |
          bun run build:web-assets
          bun run prepare:opencode-cli
          bun run verify:opencode-cli
          bun run bundle:main
          bun run rebuild:native
          bunx electron-builder --mac --${{ matrix.arch }} --publish=never
          bun run verify:opencode-cli:packaged

      - name: Upload macOS installable artifacts to release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2.6.2
        with:
          tag_name: v${{ needs.create-release.outputs.version }}
          files: |
            packages/electron/dist/*.dmg
            packages/electron/dist/*.zip
            packages/electron/dist/*.blockmap
            packages/electron/dist/latest-mac.yml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-desktop-electron-windows:
    needs: create-release
    runs-on: windows-2022
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
            target: x86_64-pc-windows-msvc
            platform: win32-x64
          - arch: arm64
            target: aarch64-pc-windows-msvc
            platform: win32-arm64
    steps:
      - name: Checkout selected ref
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ github.ref }}

      - name: Setup bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'

      - name: Bump version in package.json files
        shell: bash
        run: node scripts/bump-version.mjs ${{ needs.create-release.outputs.version }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Get bundled OpenCode CLI version
        id: opencode_cli_version
        shell: bash
        run: |
          VERSION=$(node -p "require('./package.json').dependencies['@opencode-ai/sdk']")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Cache bundled OpenCode CLI artifact
        uses: actions/cache@0400d5f644dc74513175e3cd8d07132dd4860809 # v4.2.4
        with:
          path: packages/electron/.cache/opencode-cli
          key: opencode-cli-${{ runner.os }}-${{ matrix.arch }}-${{ steps.opencode_cli_version.outputs.version }}
          restore-keys: |
            opencode-cli-${{ runner.os }}-${{ matrix.arch }}-

      - name: Build web assets
        working-directory: packages/electron
        run: bun run build:web-assets

      - name: Prepare bundled OpenCode CLI
        working-directory: packages/electron
        shell: bash
        run: |
          bun run prepare:opencode-cli
          bun run verify:opencode-cli

      - name: Bundle main process
        working-directory: packages/electron
        run: bun run bundle:main

      - name: Rebuild native modules
        working-directory: packages/electron
        shell: bash
        run: node ./scripts/rebuild-native.mjs

      - name: Build Windows app
        working-directory: packages/electron
        shell: bash
        run: |
          node ./scripts/package.mjs --win --${{ matrix.arch }} --publish=never
          bun run verify:opencode-cli:packaged

      - name: Upload Windows installable artifacts to release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2.6.2
        with:
          tag_name: v${{ needs.create-release.outputs.version }}
          files: |
            packages/electron/dist/*.exe
            packages/electron/dist/*.blockmap
            packages/electron/dist/latest.yml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  finalize-release:
    needs: [create-release, build-desktop-electron-macos, build-desktop-electron-windows]
    runs-on: ubuntu-latest
    steps:
      - name: Publish release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2.6.2
        with:
          tag_name: v${{ needs.create-release.outputs.version }}
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
